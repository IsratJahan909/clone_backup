spring.application.name=Hr-and-payroll-management-system-backend



# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/payroll
spring.datasource.username=root
spring.datasource.password=root

server.port=8080

# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# Show SQL in console

spring.jpa.show-sql=true


spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true







# Format SQL queries (for readability)
spring.jpa.properties.hibernate.format_sql=true

# Database dialect for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Hibernate DDL Auto (options: none, validate, update, create, create-drop)
spring.jpa.hibernate.ddl-auto=update

# ===============================
# SWAGGER/OPENAPI CONFIGURATION
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method


app.admin.email=admin@gmail.com
app.admin.password=1234

# Enable detailed security logs to debug 403 issues
logging.level.org.springframework.security=DEBUG

spring.jackson.time-zone=Asia/Dhaka
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Dhaka
